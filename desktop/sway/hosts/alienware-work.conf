# Alienware m15 R7-specific sway config — work location.
# Symlinked to ~/.config/sway/config.d/local.conf by `make setup-alienware-work`.
# Loaded early (before $menu/outputs are used) — see include order in ../config.

# Keyboard layout. Under X11 (i3/GDM) this comes for free from /etc/default/keyboard
# via generated Xorg config, but sway is a native Wayland compositor and never reads
# Xorg config — libxkbcommon falls back to "us" unless told otherwise, which is why
# e.g. the \| key was producing \/| instead of the expected ~ (GB is ISO, US is ANSI;
# the physical key's legend/position differs between the two layouts).
input type:keyboard {
    xkb_layout gb
}

# The volume-down key produces sym: NoSymbol (confirmed via `wev`) — the keymap has
# no symbol for it at all, so no `bindsym XF86AudioLowerVolume` can ever match
# regardless of spelling/casing. Bind by keycode instead: 407, exactly as `wev`
# reported it (wev's keycode is already XKB-offset, not raw evdev — verified against
# Super_L: wev showed 133, evdev KEY_LEFTMETA is 125, 125+8=133 — so no further +8
# adjustment needed here). Volume-up isn't affected — its key does produce a real
# XF86AudioRaiseVolume symbol — so the shared config's bindsym for it is left as-is.
bindcode 407 exec pactl set-sink-volume @DEFAULT_SINK@ -5%

# Draft translation from ~/.screenlayout/work.sh (xrandr) — see sway-migration-todo.md
# "Displays" section for the mapping rationale. UNCONFIRMED: names/rate not yet
# checked against `swaymsg -t get_outputs` on this machine.
# ultrawide external (USB-C/DP; HDMI faulty). 165Hz at this resolution silently
# fails to light the panel (sway reports success but output stays inactive) —
# 5120x1440@165Hz exceeds the link bandwidth of the current USB-C cable/connection.
# 60Hz trains fine, so pin that.
output DP-1  mode 5120x1440@60Hz position 1920 0
# laptop, offset per work.sh (not vertically centered)
output eDP-1 mode 1920x1080       position 0 1286

# Pin workspaces to outputs: 1-4 external, 5-6 built-in. If DP-1 isn't connected,
# sway falls back to putting its workspaces on whatever output is available
# (eDP-1) rather than dropping them — this is just a preference, not a hard rule.
workspace 1 output DP-1
workspace 2 output DP-1
workspace 3 output DP-1
workspace 4 output DP-1
workspace 5 output eDP-1
workspace 6 output eDP-1

# Wallpaper — solid "Dark Aubergine" (#2C001E), the darkest shade in Canonical's
# brand palette. No image file tracked in this repo; sway drives swaybg natively
# via `output bg`, no separate exec needed.
output * bg #2C001E solid_color

# No reform-tools execs, no custom/kanata, no wofi.css here — those are Reform-only.
# reform-wallpaper.py already runs its own swaybg for the Reform; keeping this
# solid-color line Alienware-only avoids two swaybg instances fighting over Reform.
