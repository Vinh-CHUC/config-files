# MNT Pocket Reform-specific sway config.
# Symlinked to ~/.config/sway/config.d/local.conf by `make setup-sway-reform`.
# Loaded early (before $menu/outputs are used) — see include order in ../config.

# wofi.css only exists on this machine
set $menu wofi --show drun -p Search -n -i -I -W 66% -l top_left -s $HOME/.config/wofi.css

output DSI-1 transform 270
output DSI-1 scale 2

# start MNT Reform tray menu
exec /usr/libexec/reform-tools/reform-tray.py

# start wallpaper script
exec /usr/libexec/reform-tools/reform-wallpaper.py
